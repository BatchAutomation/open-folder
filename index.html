<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening folder...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        h2 {
            color: #00d4ff;
            margin-bottom: 0.5rem;
        }

        p {
            color: #aaa;
            line-height: 1.6;
        }

        .path {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 1rem;
            margin: 1.5rem 0;
            word-break: break-all;
            font-family: "Cascadia Code", "Fira Code", monospace;
            font-size: 0.9rem;
            color: #00d4ff;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            margin: 0.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .btn-primary:hover {
            background: #00b8d9;
        }

        .btn-secondary {
            background: #16213e;
            color: #00d4ff;
            border: 1px solid #0f3460;
        }

        .btn-secondary:hover {
            background: #0f3460;
        }

        .status {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #888;
        }

        .error {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Opening Folder</h2>
        <p>Launching File Explorer for:</p>
        <div class="path" id="displayPath">Reading path...</div>
        <div id="autoMessage" class="status">Attempting to open automatically...</div>

        <div id="fallback" class="error">
            <p>If the folder didn't open, your browser may have blocked it.
                Click below to try again or copy the path manually.</p>
            <a id="manualLink" class="btn btn-primary" href="#">Open Folder</a>
            <button class="btn btn-secondary" onclick="copyPath()">Copy UNC Path</button>
            <div id="copyStatus" class="status"></div>
        </div>
    </div>

    <script>
        (function () {
            // Get the path from the URL query string
            // Expected format: ?path=corp.restor3d.com/FileShare/CompanyFiles/...
            const params = new URLSearchParams(window.location.search);
            let path = params.get("path");

            if (!path) {
                // Also support hash-based paths: #corp.restor3d.com/FileShare/...
                path = window.location.hash.substring(1);
            }

            if (!path) {
                document.getElementById("displayPath").textContent = "Error: No path provided.";
                document.getElementById("autoMessage").textContent = "";
                return;
            }

            // Decode any URL encoding
            path = decodeURIComponent(path);

            // Build the openfolder:// URI (always use forward slashes)
            const openfolderUri = "openfolder://" + path.replace(/\\/g, "/");

            // Build the UNC path for display / copy (backslashes)
            const uncPath = "\\\\" + path.replace(/\//g, "\\").replace(/^\\+/, "");

            // Display the UNC path
            document.getElementById("displayPath").textContent = uncPath;

            // Set manual link
            document.getElementById("manualLink").href = openfolderUri;

            // Attempt to auto-open
            window.location.href = openfolderUri;

            // After a short delay, show the fallback buttons
            // (we can't detect if the protocol handler fired)
            setTimeout(function () {
                document.getElementById("autoMessage").textContent =
                    "If nothing happened, use the buttons below:";
                document.getElementById("fallback").style.display = "block";
            }, 2000);

            // Copy UNC path to clipboard
            window.copyPath = function () {
                navigator.clipboard.writeText(uncPath).then(function () {
                    document.getElementById("copyStatus").textContent =
                        "Copied! Paste into File Explorer's address bar.";
                }).catch(function () {
                    // Fallback for older browsers
                    const ta = document.createElement("textarea");
                    ta.value = uncPath;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand("copy");
                    document.body.removeChild(ta);
                    document.getElementById("copyStatus").textContent = "Copied!";
                });
            };
        })();
    </script>
</body>

</html>
